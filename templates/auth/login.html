{% extends 'base.html' %}
{% block title %}Login — Patient Smart Card{% endblock %}
{% block extra_css %}
<style>
  .auth-wrap { max-width:480px; margin:0 auto; }
  .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:40px; }
  .auth-card h2 { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; color:#fff; margin-bottom:8px; }
  .auth-card .sub { color:var(--muted); font-size:14px; margin-bottom:32px; }
  .auth-footer { text-align:center; margin-top:20px; font-size:13px; color:var(--muted); }
  .auth-footer a { color:var(--teal); text-decoration:none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap fade-up">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <p class="sub">Log in to access your Patient Smart Card.</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        {{ form.username }}
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        {{ form.password }}
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Log In →</button>
    </form>
  </div>
  <div class="auth-footer">No account? <a href="{% url 'signup' %}">Sign up here</a></div>
</div>
{% endblock %}
